<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Login Website</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="#" class="logo">Logo</a>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
    <li><a href="#" class="nav-login-btn" id="navLoginBtn">Login</a></li>
  </ul>
</nav>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('loginModal')">✕</button>
    <h2>Login</h2>
    <div class="message" id="loginMessage"></div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
          <span class="input-icon">✉</span>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
          <span class="input-icon">🔒</span>
        </div>
      </div>
      <div class="form-options">
        <label><input type="checkbox" id="rememberMe"> Remember me</label>
        <a href="#" onclick="alert('Password reset link sent to your email!')">Forgot Password?</a>
      </div>
      <button type="submit" class="submit-btn">Login</button>
    </form>
    <div class="modal-footer">
      Don't have an account? <a onclick="switchModal('loginModal','registerModal')">Register</a>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal-overlay" id="registerModal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('registerModal')">✕</button>
    <h2>Register</h2>
    <div class="message" id="registerMessage"></div>
    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="regName" placeholder="Enter your name" required>
          <span class="input-icon">👤</span>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <input type="email" id="regEmail" placeholder="Enter your email" required>
          <span class="input-icon">✉</span>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="regPassword" placeholder="Create a password" required minlength="6">
          <span class="input-icon">🔒</span>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
          <span class="input-icon">🔒</span>
        </div>
      </div>
      <button type="submit" class="submit-btn">Register</button>
    </form>
    <div class="modal-footer">
      Already have an account? <a onclick="switchModal('registerModal','loginModal')">Login</a>
    </div>
  </div>
</div>

<!-- Welcome Page (shown after login) -->
<div class="welcome-page" id="welcomePage">
  <h1>Welcome, <span id="userName">User</span>! 🎉</h1>
  <p>You have successfully logged in.</p>
  <button class="logout-btn" onclick="handleLogout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
